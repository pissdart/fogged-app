essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting fogged.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up Fogged..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=app.fogged.com' "/usr/share/applications/fogged.desktop"
  - echo "Search and remove fogged.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/fogged.desktop" ]; then rm -f "$user_dir/.local/share/applications/fogged.desktop"; echo "Found and removed fogged.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "Fogged is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove Fogged configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing Fogged user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/fogged" ]; then rm -rf "$user_dir/.local/share/fogged"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/fogged
  - echo "Fogged data cleanup complete."

