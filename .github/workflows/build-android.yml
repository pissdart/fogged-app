name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  IS_GITHUB_ACTIONS: 1
  FLUTTER_VERSION: '3.38.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/lib/android
          sudo apt-get autoremove -y && sudo apt-get clean
          echo "Free space:" && df -h /

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Download core library
        run: |
          CORE_VERSION=$(grep 'core.version' dependencies.properties | cut -d= -f2)
          echo "Core version: $CORE_VERSION"
          mkdir -p android/app/libs
          curl -sL "https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}/hiddify-lib-android.tar.gz" -o /tmp/core.tar.gz
          echo "Downloaded $(ls -lh /tmp/core.tar.gz | awk '{print $5}')"
          tar xzf /tmp/core.tar.gz -C android/app/libs/
          echo "Extracted:" && ls -la android/app/libs/

      - name: Download geo assets
        run: |
          mkdir -p assets/core
          curl -sL "https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip.db" -o assets/core/geoip.db
          curl -sL "https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite.db" -o assets/core/geosite.db
          ls -la assets/core/

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code
        continue-on-error: true
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: |
          set -euo pipefail
          flutter build apk --debug --verbose 2>&1 | tee /tmp/build.log || true
          echo "=== LAST 50 LINES ==="
          tail -50 /tmp/build.log
          echo "=== APK FILES ==="
          find build -name "*.apk" 2>/dev/null || echo "No APKs found"
          # Fail if no APK was produced
          test -f build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fogged-vpn-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn
