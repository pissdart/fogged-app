name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Download core library
        run: |
          set -e
          CORE_VERSION=$(grep 'core.version' dependencies.properties | cut -d= -f2)
          echo "Core version: $CORE_VERSION"
          mkdir -p android/app/libs
          curl -fSL "https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}/hiddify-lib-android.tar.gz" -o /tmp/core.tar.gz
          tar xzf /tmp/core.tar.gz -C android/app/libs/
          ls -la android/app/libs/

      - name: Download geo assets
        run: |
          set -e
          mkdir -p assets/core
          curl -fSL "https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip.db" -o assets/core/geoip.db
          curl -fSL "https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite.db" -o assets/core/geosite.db

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fogged-vpn-android
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
