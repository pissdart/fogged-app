name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Verify tools
        run: |
          echo "=== Flutter ==="
          flutter --version
          echo "=== Java ==="
          java -version
          echo "=== Android SDK ==="
          echo $ANDROID_HOME
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"

      - name: Download core library
        run: |
          set -e
          CORE_VERSION=$(grep 'core.version' dependencies.properties | cut -d= -f2)
          echo "Core version: $CORE_VERSION"
          mkdir -p android/app/libs
          curl -fSL "https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}/hiddify-lib-android.tar.gz" -o /tmp/core.tar.gz
          ls -lh /tmp/core.tar.gz
          tar xzf /tmp/core.tar.gz -C android/app/libs/
          ls -la android/app/libs/

      - name: Download geo assets
        run: |
          set -e
          mkdir -p assets/core
          curl -fSL "https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip.db" -o assets/core/geoip.db
          curl -fSL "https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite.db" -o assets/core/geosite.db
          ls -la assets/core/

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code
        continue-on-error: true
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: |
          flutter build apk --debug 2>&1
          find build -name "*.apk" -ls

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fogged-vpn-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn
