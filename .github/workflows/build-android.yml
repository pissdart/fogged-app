name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  IS_GITHUB_ACTIONS: 1
  CHANNEL: "dev"
  FLUTTER_VERSION: '3.38.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps and prepare
        run: |
          make android-apk-install-deps || true
          make android-apk-prepare || true

      - name: Build APK
        run: |
          make android-apk-release || flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fogged-vpn-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            out/*.apk
          retention-days: 30
